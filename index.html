<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Player — dopieszczony</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">

    <!-- VIEW: ALBUMY -->
    <section id="albumsView" class="view active" aria-label="Widok albumów">
      <header class="view-header topbar">
        <h1>Albumy</h1>
        <div class="controls">
          <input id="search" type="search" placeholder="Szukaj albumu lub piosenki..." aria-label="Szukaj">
          <select id="sort" aria-label="Sortuj">
            <option value="title">A → Z</option>
            <option value="year">Rok wydania</option>
          </select>
        </div>
      </header>

      <div id="albumsGrid" class="albums-grid" role="list" aria-label="Lista albumów"></div>

      <div id="errorMsg" class="error hidden" role="alert"></div>
    </section>

    <!-- VIEW: PIOSENKI W ALBUMIE -->
    <section id="tracksView" class="view" aria-label="Lista piosenek">
      <header class="view-header topbar">
        <button id="backFromTracks" class="back btn" aria-label="Wstecz">←</button>
        <div>
          <h2 id="albumTitle">Album</h2>
          <div id="albumMeta" class="muted"></div>
        </div>
      </header>

      <main class="tracks-container">
        <div class="album-cover-small" id="tracksCover"><img id="tracksCoverImg" src="" alt=""></div>
        <div id="tracksList" class="tracks-list" role="list"></div>
      </main>
    </section>

    <!-- VIEW: PLAYER -->
    <section id="playerView" class="view" aria-label="Odtwarzacz">
      <header class="view-header topbar">
        <button id="backFromPlayer" class="back btn" aria-label="Wstecz">←</button>
        <div>
          <h2 id="playerAlbumTitle">Odtwarzacz</h2>
          <div id="playerAlbumMeta" class="muted"></div>
        </div>
      </header>

      <main class="player-main">
        <div class="player-left">
          <div id="playerCover" class="player-cover">
            <img id="coverImg" src="" alt="">
            <div id="coverSpinner" class="spinner hidden" aria-hidden="true"></div>
          </div>

          <div class="player-meta">
            <h3 id="nowTitle">Nic nie gra</h3>
            <div id="nowArtist" class="muted">—</div>

            <div id="progressBar" class="progress" role="progressbar" tabindex="0" aria-label="Postęp odtwarzania">
              <i class="progress-fill"></i>
              <div class="scrubber" id="scrubber" aria-hidden="true"></div>
            </div>

            <div class="controls-row">
              <button id="prevBtn" class="btn" title="Poprzedni">⏮</button>
              <button id="playPauseBtn" class="btn" title="Odtwórz/Pauza">▶️</button>
              <button id="nextBtn" class="btn" title="Następny">⏭</button>

              <button id="shuffleBtn" class="btn" title="Losowość">🔀</button>
              <button id="loopBtn" class="btn" title="Zapętlaj">🔁</button>

              <button id="likeBtn" class="btn" title="Polub">♡</button>

              <div class="time muted">
                <span id="curTime">0:00</span> / <span id="durTime">0:00</span>
              </div>
            </div>

            <div class="volume-row">
              <label for="volumeEl">Głośność</label>
              <input id="volumeEl" type="range" min="0" max="1" step="0.01">
            </div>

            <div class="lrc-offset">
              <label for="lrcOffset">Offset LRC: <span id="offsetVal">0 ms</span></label>
              <input id="lrcOffset" type="range" min="-2000" max="2000" step="50" />
            </div>
          </div>
        </div>

        <div class="player-right">
          <div class="tabs">
            <button class="tab-btn active" data-tab="lyrics">Tekst</button>
            <button class="tab-btn" data-tab="queue">Kolejka</button>
          </div>

          <div id="lyrics" class="tab-content" aria-live="polite"></div>
          <div id="resumeAuto" class="resume hidden"><button id="resumeBtn" class="btn">Przywróć autoscroll</button></div>
          <div id="queue" class="tab-content hidden"></div>
        </div>
      </main>

      <div id="audioError" class="error hidden" role="alert"></div>
      <audio id="audio" preload="metadata"></audio>
    </section>

  </div>

  <script src="app.js" defer></script>
</body>
</html>
