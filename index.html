<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Player — dopieszczony</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">

    <!-- VIEW: ALBUMY -->
    <section id="albumsView" class="view active" aria-label="Widok albumów">
      <header class="view-header topbar">
        <h1>Albumy</h1>
        <div class="controls">
          <input id="search" type="search" placeholder="Szukaj albumu lub piosenki..." aria-label="Szukaj">
          <select id="sort" aria-label="Sortuj">
            <option value="title">A → Z</option>
            <option value="year">Rok wydania</option>
          </select>
        </div>
      </header>

      <div id="albumsGridWrap" class="albums-grid-wrap">
        <div id="albumsGrid" class="albums-grid" role="list" aria-label="Lista albumów"></div>
      </div>

      <div id="errorMsg" class="error hidden" role="alert"></div>
    </section>

    <!-- VIEW: PIOSENKI W ALBUMIE -->
    <section id="tracksView" class="view" aria-label="Lista piosenek">
      <header class="view-header topbar">
        <button id="backFromTracks" class="back btn" aria-label="Wstecz">←</button>
        <div>
          <h2 id="albumTitle">Album</h2>
          <div id="albumMeta" class="muted"></div>
        </div>
      </header>

      <main class="tracks-container">
        <div class="album-cover-small" id="tracksCover"><img id="tracksCoverImg" src="" alt=""></div>
        <div id="tracksList" class="tracks-list" role="list"></div>
      </main>
    </section>

    <!-- VIEW: PLAYER -->
    <section id="playerView" class="view" aria-label="Odtwarzacz">
      <header class="view-header topbar">
        <button id="backFromPlayer" class="back btn" aria-label="Wstecz">←</button>
        <div>
          <h2 id="playerAlbumTitle">Odtwarzacz</h2>
          <div id="playerAlbumMeta" class="muted"></div>
        </div>
      </header>

      <main class="player-main">
        <div class="player-left">
          <div id="playerCover" class="player-cover">
            <img id="coverImg" src="" alt="">
            <div id="coverSpinner" class="spinner hidden" aria-hidden="true"></div>
          </div>

          <div class="player-meta">
            <h3 id="nowTitle">Nic nie gra</h3>
            <div id="nowArtist" class="muted">—</div>

            <div id="progressBar" class="progress" role="progressbar" tabindex="0" aria-label="Postęp odtwarzania">
              <i class="progress-fill"></i>
              <div class="scrubber" id="scrubber" aria-hidden="true"></div>
            </div>

            <div class="controls-row">
              <button id="prevBtn" class="btn icon-btn" title="Poprzedni" aria-label="Poprzedni">⏮</button>
              <button id="playPauseBtn" class="btn play-btn" title="Odtwórz/Pauza" aria-label="Odtwórz">▶️</button>
              <button id="nextBtn" class="btn icon-btn" title="Następny" aria-label="Następny">⏭</button>

              <button id="shuffleBtn" class="btn icon-btn" title="Losowość" aria-label="Losowość">🔀</button>
              <button id="loopBtn" class="btn icon-btn" title="Zapętlaj" aria-label="Zapętlaj">🔁</button>

              <button id="likeBtn" class="btn icon-btn" title="Polub" aria-label="Polub">♡</button>

              <div class="time muted">
                <span id="curTime">0:00</span> / <span id="durTime">0:00</span>
              </div>
            </div>

            <div class="volume-row">
              <label for="volumeEl" class="muted">Głośność</label>
              <div class="custom-range-wrap">
                <input id="volumeEl" class="custom-range" type="range" min="0" max="1" step="0.01">
                <div class="custom-range-fill" aria-hidden="true"></div>
              </div>
            </div>

          </div>
        </div>

        <div class="player-right">
          <div class="tabs">
            <button class="tab-btn active" data-tab="lyrics">Tekst</button>
            <button class="tab-btn" data-tab="queue">Kolejka</button>
          </div>

          <div id="lyrics" class="tab-content" aria-live="polite"></div>

          <div id="resumeAuto" class="resume hidden" aria-hidden="true">
            <button id="resumeBtn" class="btn icon-btn" title="Przywróć autoscroll" aria-label="Przywróć autoscroll">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 9l3-3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div id="queue" class="tab-content hidden"></div>
        </div>
      </main>

      <div id="audioError" class="error hidden" role="alert"></div>
      <audio id="audio" preload="metadata"></audio>
    </section>

    <!-- MINI PLAYER bar -->
    <div id="miniPlayer" class="mini-player hidden" role="region" aria-label="Mini player - kliknij, by otworzyć">
      <div class="mini-left" id="miniLeft">
        <img id="miniThumb" src="covers/placeholder.png" alt="" />
        <div class="mini-meta">
          <div id="miniTitle" class="mini-title">Nic nie gra</div>
          <div id="miniSub" class="mini-sub muted">—</div>
        </div>
      </div>
      <div class="mini-controls">
        <button id="miniPrev" class="btn icon-btn" title="Prev">⏮</button>
        <button id="miniPlay" class="btn icon-btn" title="Play/Pause">▶️</button>
        <button id="miniNext" class="btn icon-btn" title="Next">⏭</button>
        <button id="miniLike" class="btn icon-btn" title="Like">♡</button>
        <button id="miniOpen" class="btn icon-btn" title="Open">⬆</button>
      </div>
    </div>

  </div>

  <script src="app.js" defer></script>
</body>
</html>
