<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ALBUMY -->
  <section id="albumsView" class="view active">
    <header>
      <h1>Albumy</h1>
      <input type="text" id="search" placeholder="Szukaj albumu lub piosenki">
    </header>
    <div id="albums" class="albums-grid"></div>
  </section>

  <!-- PIOSENKI -->
  <section id="tracksView" class="view">
    <header>
      <button class="back">←</button>
      <h2 id="albumTitle"></h2>
    </header>
    <ul id="tracks"></ul>
  </section>

  <!-- PLAYER -->
  <section id="playerView" class="view">
    <header>
      <button class="back">←</button>
    </header>

    <div class="player">
      <img id="cover">
      <h3 id="title"></h3>

      <div class="progress">
        <i></i>
      </div>

      <div class="controls">
        <button id="play">⏯</button>
      </div>

      <div class="tabs">
        <button data-tab="lyrics">Tekst</button>
        <button data-tab="queue">Kolejka</button>
      </div>

      <div id="lyrics" class="tab active"></div>
      <div id="queue" class="tab"></div>
    </div>
  </section>

</div>

<audio id="audio"></audio>
<script src="app.js"></script>
</body>
</html>
